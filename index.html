<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Gửi Vợ yêu Đức ơi!</title>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background-color: #ffeef2; padding-top: 50px; overflow: hidden; }
        #app { display: block; }
        h1 { color: #d63031; font-size: 28px; }
        .btn { padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; margin: 10px; transition: 0.2s; }
        #yesBtn { background-color: #ff7675; color: white; }
        #noBtn { background-color: #74b9ff; color: white; position: absolute; }
    </style>
</head>
<body>
    <div id="app">
        <img src="https://media.tenor.com/492572b9a715f2065363412354c46f22/sad-cat.gif" width="200">
        <h1>Vợ yêu Đức ơi tha lỗi cho chồng nghenn <3</h1>
        <button class="btn" id="yesBtn" onclick="accept()">Đồng ý</button>
        <button class="btn" id="noBtn" onmouseover="moveButton()">Vợ đừng giận chồng nữa nha</button>
    </div>

    <script>
        const messages = ["Vợ đừng giận chồng nữa nha", "Chồng sai rồi mà :((", "Tha lỗi cho chồng đi", "Thương nô lệ td mãi mãi của vợ i mừ", "Thương và yêu vợ Đức nhất mà"];
        let index = 0;

        function moveButton() {
            document.getElementById('noBtn').innerText = messages[index];
            index = (index + 1) % messages.length;
            var x = Math.random() * (window.innerWidth - 150);
            var y = Math.random() * (window.innerHeight - 150);
            document.getElementById('noBtn').style.left = x + 'px';
            document.getElementById('noBtn').style.top = y + 'px';
        }

        function accept() {
            document.getElementById('app').innerHTML = 
                '<h1 style="color: #6c5ce7;">Yêu vợ yêu nhất trên đời! Em Quân yêu chủ nhân Đức nhất ❤️</h1>' +
                '<img src="https://i.pinimg.com/originals/c7/ef/fb/c7effb0f9103fa52caade08a96cc5f25.gif" width="300">';
        }
    </script>
</body>
</html>
